name: Cost Stop

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_WORKING_DIR: envs/dev
  RDS_INSTANCE: tomario-dev-rds
  TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}

jobs:
  cost-stop:
    name: Stop Resources
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Delete ALB and ASG (SG/IAMは残す)
        run: |
          terraform destroy \
            -target=module.backend.aws_autoscaling_group.this \
            -target=module.backend.aws_launch_template.this \
            -target=module.backend.aws_lb_listener.http \
            -target=module.backend.aws_lb_target_group.this \
            -target=module.backend.aws_lb.this \
            -auto-approve

      - name: Stop RDS
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_INSTANCE }} \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)
          if [ "$STATUS" = "available" ]; then
            aws rds stop-db-instance --db-instance-identifier ${{ env.RDS_INSTANCE }}
          else
            echo "RDS is already in '$STATUS' state, skipping stop."
          fi
