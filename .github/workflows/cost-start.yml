name: Cost Start

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_WORKING_DIR: envs/dev
  RDS_INSTANCE: tomario-dev-rds
  ECS_CLUSTER: tomario-dev-cluster
  ECS_SERVICE: tomario-dev-service
  TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}

jobs:
  cost-start:
    name: Start Resources
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Start RDS
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_INSTANCE }} \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)
          if [ "$STATUS" = "stopped" ]; then
            aws rds start-db-instance --db-instance-identifier ${{ env.RDS_INSTANCE }}
          else
            echo "RDS is already in '$STATUS' state, skipping start."
          fi

      - name: Wait for RDS to be available
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_INSTANCE }} \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)
          if [ "$STATUS" != "available" ]; then
            aws rds wait db-instance-available \
              --db-instance-identifier ${{ env.RDS_INSTANCE }}
          else
            echo "RDS is already available, skipping wait."
          fi

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Scale ECS to 1
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}
