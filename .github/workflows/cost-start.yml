name: Cost Start

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_WORKING_DIR: envs/dev
  RDS_INSTANCE: tomario-dev-rds

jobs:
  cost-start:
    name: Start Resources
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Start RDS
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_INSTANCE }} \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)
          if [ "$STATUS" = "stopped" ]; then
            aws rds start-db-instance --db-instance-identifier ${{ env.RDS_INSTANCE }}
          else
            echo "RDS is already in '$STATUS' state, skipping start."
          fi

      - name: Wait for RDS to be available
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.RDS_INSTANCE }} \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)
          if [ "$STATUS" != "available" ]; then
            aws rds wait db-instance-available \
              --db-instance-identifier ${{ env.RDS_INSTANCE }}
          else
            echo "RDS is already available, skipping wait."
          fi

      - name: Terraform Init
        run: terraform init

      - name: Create backend (terraform apply -target=module.backend)
        run: terraform apply -target=module.backend -auto-approve
